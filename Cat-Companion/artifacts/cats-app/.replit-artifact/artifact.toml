kind = "web"
previewPath = "/"
title = "Cat Care"
version = "1.0.0"
id = "artifacts/cats-app"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19218

[services.development]
run = "pnpm --filter @workspace/cats-app run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/cats-app", "run", "build" ]
publicDir = "artifacts/cats-app/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19218"
BASE_PATH = "/"
